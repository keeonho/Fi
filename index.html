<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Impression For You</title>
<link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #E5F0FA;
    --c2: #D1E8FC;
    --c3: #BDE0FE;
    --c4: #A2D2FF;
    --c5: #8FC9FF;
    --text: #2a4a6e;
    --text-light: #4a7aa0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
    background: #c9e8ff;
  }

  .bg-fixed {
    position: fixed; inset: 0;
    background-image: url('https://files.catbox.moe/mhiw9l.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }

  .bg-overlay {
    position: fixed; inset: 0;
    background: rgba(210, 235, 255, 0.28);
    z-index: 1;
  }

  /* WATERMARK */
  .watermark {
    position: fixed;
    bottom: 18px;
    right: 18px;
    font-family: 'Chewy', cursive;
    font-size: 0.95rem;
    color: rgba(42, 74, 110, 0.5);
    letter-spacing: 2px;
    z-index: 10;
    user-select: none;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.38);
    padding: 7px 18px;
    border-radius: 50px;
    box-shadow: 0 2px 14px rgba(100,170,255,0.13);
  }

  /* LOADING */
  #loading {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, rgba(229,240,250,0.97), rgba(161,210,255,0.97));
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.7s ease;
  }
  #loading.hide { opacity: 0; pointer-events: none; }

  #loading-icon {
    width: 110px;
    animation: loadBounce 0.85s ease-in-out infinite alternate;
    filter: drop-shadow(0 8px 16px rgba(100,170,255,0.4));
  }
  #loading p {
    font-family: 'Chewy', cursive;
    font-size: 1.4rem;
    color: var(--text);
    margin-top: 20px;
    letter-spacing: 2px;
    opacity: 0.7;
  }
  .loading-dots span {
    display: inline-block;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes loadBounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-18px) scale(1.05); }
  }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* APP */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px 60px;
    opacity: 0;
    transition: opacity 0.6s ease 0.1s;
  }
  #app.show { opacity: 1; }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.68);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 32px;
    padding: 28px 22px 30px;
    width: 100%;
    max-width: 370px;
    box-shadow: 0 8px 40px rgba(100,170,255,0.2), 0 2px 8px rgba(100,150,220,0.1);
    text-align: center;
  }

  /* TITLE */
  .page-title {
    font-family: 'Chewy', cursive;
    font-size: 1.1rem;
    color: var(--c5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.9;
  }

  /* PROFILE NAV */
  .profile-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .nav-btn {
    background: rgba(161,210,255,0.4);
    border: 1.5px solid rgba(143,201,255,0.6);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    user-select: none;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(143,201,255,0.6); transform: scale(1.1); }
  .nav-btn:active { transform: scale(0.95); }

  .profile-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(143,201,255,0.4);
    transition: all 0.3s ease;
  }
  .dot.active {
    background: var(--c5);
    width: 22px;
    border-radius: 4px;
  }

  /* PROFILE PHOTO */
  .profile-photo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 14px;
  }
  .profile-photo {
    width: 120px; height: 120px;
    border-radius: 20px;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.95);
    box-shadow: 0 4px 20px rgba(100,170,255,0.35);
    transition: opacity 0.28s ease, transform 0.28s ease;
    display: block;
  }
  .profile-photo.switching { opacity: 0; transform: scale(0.9); }
  .profile-ring {
    position: absolute;
    inset: -7px;
    border-radius: 26px;
    border: 2px dashed rgba(143,201,255,0.45);
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .profile-name {
    font-family: 'Chewy', cursive;
    font-size: 1.9rem;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 16px;
    transition: opacity 0.28s ease;
  }
  .profile-name.switching { opacity: 0; }

  /* SEE BUTTON */
  .see-btn {
    background: linear-gradient(135deg, var(--c4), var(--c5));
    border: none;
    color: white;
    font-family: 'Chewy', cursive;
    font-size: 1.35rem;
    letter-spacing: 2px;
    padding: 13px 50px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(143,201,255,0.5);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .see-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
    border-radius: inherit;
  }
  .see-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 28px rgba(143,201,255,0.6); }
  .see-btn:active { transform: scale(0.97); }

  /* IMPRESSION SCREEN */
  #impression-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: left;
    width: 100%;
  }
  #impression-screen.active { display: flex; }

  .imp-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    width: 100%;
  }
  .imp-photo {
    width: 56px; height: 56px;
    border-radius: 12px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 12px rgba(100,170,255,0.3);
    flex-shrink: 0;
  }
  .imp-name {
    font-family: 'Chewy', cursive;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .imp-label {
    font-size: 0.75rem;
    color: var(--text-light);
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  /* TYPEWRITER BOX */
  .typewriter-box {
    background: rgba(229,240,250,0.55);
    border: 1.5px solid rgba(189,224,254,0.6);
    border-radius: 18px;
    padding: 16px 18px;
    width: 100%;
    min-height: 120px;
    font-size: 0.875rem;
    line-height: 1.75;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 18px;
    position: relative;
  }

  #typewriter-text {
    display: inline;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--c5);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.75s step-end infinite;
  }
  .cursor.done { display: none; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* SPOTIFY EMBED */
  .spotify-wrap {
    width: 100%;
    margin-bottom: 18px;
    border-radius: 14px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .spotify-wrap.show { opacity: 1; transform: translateY(0); }
  .spotify-wrap iframe {
    width: 100%;
    border-radius: 14px;
    border: none;
    display: block;
  }

  /* BACK BTN */
  .back-btn {
    background: rgba(161,210,255,0.35);
    border: 1.5px solid rgba(143,201,255,0.5);
    color: var(--text);
    font-family: 'Chewy', cursive;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 10px 32px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
  }
  .back-btn.show { opacity: 1; transform: translateY(0); }
  .back-btn:hover { background: rgba(143,201,255,0.5); transform: translateY(-2px) !important; }

  #profile-screen.hidden { display: none; }
</style>
</head>
<body>

<div class="bg-fixed"></div>
<div class="bg-overlay"></div>
<div class="watermark">@foocl ganteng</div>

<!-- LOADING -->
<div id="loading">
  <img id="loading-icon" src="https://files.catbox.moe/rgrpob.png" alt="loading">
  <p>loading<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></p>
</div>

<!-- APP -->
<div id="app">
  <div class="card">

    <!-- PROFILE SCREEN -->
    <div id="profile-screen">
      <div class="page-title">My First Impression For You</div>

      <div class="profile-nav">
        <button class="nav-btn" id="prev-btn">&#8249;</button>
        <div class="profile-dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <button class="nav-btn" id="next-btn">&#8250;</button>
      </div>

      <div class="profile-photo-wrap">
        <div class="profile-ring"></div>
        <img class="profile-photo" id="profile-photo" src="" alt="profile">
      </div>

      <div class="profile-name" id="profile-name"></div>

      <button class="see-btn" id="see-btn">SEE</button>
    </div>

    <!-- IMPRESSION SCREEN -->
    <div id="impression-screen">
      <div class="imp-header">
        <img class="imp-photo" id="imp-photo" src="" alt="">
        <div>
          <div class="imp-label">first impression</div>
          <div class="imp-name" id="imp-name"></div>
        </div>
      </div>

      <div class="typewriter-box">
        <span id="typewriter-text"></span><span class="cursor" id="cursor"></span>
      </div>

      <div class="spotify-wrap" id="spotify-wrap">
        <iframe id="spotify-iframe" src="" height="80" allowtransparency="true" allow="encrypted-media"></iframe>
      </div>

      <button class="back-btn" id="back-btn">back</button>
    </div>

  </div>
</div>

<script>
  const profiles = [
    {
      name: "Icen",
      photo: "https://raw.githubusercontent.com/valentinegift/Image/main/9d854c5ba6f746c1b79b6f17be166939.jpg",
      impression: "Ha.ha gua pertama kali ketemu dia di gc mafia, awalnya dia sok cool banget jir taunya orang nya asing and then first chat kita tuh karna dia minta save save an (ha.ha sokab), turns out dia nyambung banget jir pembahasan nya sama gua, like literally everything that I say tuh beneran nyambung sama dia, mana dulu dia tuh anak cibi (which is kita tau sejarah nya dan makin nyambung, WKAKAKAKAA) and we hate the same person, so I could literally just be my self when I'm with her, karna gua tau, we're sharing the same brain ha.ha, dan setiap malam kadang gua suka ngasih dia brain feed karna gua emang suka sharing soal ilmu pengetahuan dan emang lagi mikirin itu aja wkakakaa, she's such a good listener, makanya gua suka sharing my thoughts ke dia",
      spotify: "https://open.spotify.com/embed/track/0bHer4P44xn8jcyMH0EMs8"
    },
    {
      name: "Evan",
      photo: "https://raw.githubusercontent.com/Keeonho/Fi/main/IMG_20260310_005452_658.jpg",
      impression: "Gua awal ketemu dia karna gc yang gua dapetin di lobu, awalnya gua jbjb dia ngajak save save an kalo ga salah. Terus gua sokab reply story dia gitu, but dia sangat cool jir, gua kira dia tipe orang yang cuek, pilih pilih temen gitu, taunya pas kita mulai deket di elmanuk, Evan orangnya humble parahh. Gua dulu gabisa bedain dia sama si Ajeth maaf (they're kinda looking alike lol, WKAKAKAKAA) kadang suka gapercaya sendiri kalo dia aslinya masih kecil banget, soalnya gua kira dia udah 18, at least? I feel like we're getting so much closer setelah gua buat chp ini sih. I'm really glad to know him, like really, it feels like I have a lil brother, wkakakaa",
      spotify: "https://open.spotify.com/embed/track/5URfZHMlUWTWxPvvSBWcPk"
    },
    {
      name: "Milan",
      photo: "https://raw.githubusercontent.com/Keeonho/Fi/main/IMG_20260310_005515_153.jpg",
      impression: "Ha.ha, dia orang yang paling sok cool yang pernah gua temuin, awal gua ketemu dia di gc mafia, gua suka jbjb ke dia tapi balesan nya dry jir, bahkan dulu gua suka flirting ke dia as joke, ha.ha dan dia masih sok cool, turns out dia lesbi (pantes aja). Cuma setelah gua deket sama dia gara gara elmanuk, gua makin tau sifat nya, meski luarnya sok cool, dia orangnya asik buat di ajak temenan. Milan nih mirip si North gua liat liat, entah dari vibe nya dan typing nya pun sama, dulu gua kira mereka bestie, taunya dia malah bestian sama si Diphy, ha.ha. Btw gua dulu tau nickname nama lu karna gua center bot sangmata, bukan karna gua dulu temen lu, WKAKAKAKAA",
      spotify: "https://open.spotify.com/embed/track/1XBYiRV30ykHw5f4wm6qEn"
    },
    {
      name: "Diphy",
      photo: "https://raw.githubusercontent.com/Keeonho/Fi/main/IMG_20260310_005458_685.jpg",
      impression: "Jujur gua gatau ini orang kenapa tiba tiba ada di Elmanuk. Like out of nowhere aja? Dia bahkan gapernah nimbrung jir di ch nya si Milan tapi kenapa tiba tiba muncul di Elmanuk, dulu gua sempet curiga ke dia kalo dia adalah mata mata, soalnya dia doang yang paling diem, muncul pun cuma beberapa bubble chat doang. Kadang gua suka kayak sama dulu, soalnya dulu dia kayak gaada temen nya saking pendiem nya (maaf). Tapi itu pas awal awal doang, sekarang dia sudah berubah 180° karna terkontaminasi pergaulan bebas dari si Milan, ha.ha, sekarang dia udah kayak kembaran nya si Milan jir, orang yang dulu nya gua kira pendiem sekarang typing nya malah ikut jamet kayak si North, ha.ha, btw vibes dia kayak anak ef banget jir, WKAKAKAKAA",
      spotify: "https://open.spotify.com/embed/track/754kgU5rWscRTfvlsuEwFp"
    }
  ];

  let current = 0;
  let typeInterval = null;

  const loadingEl      = document.getElementById('loading');
  const appEl          = document.getElementById('app');
  const profilePhoto   = document.getElementById('profile-photo');
  const profileName    = document.getElementById('profile-name');
  const prevBtn        = document.getElementById('prev-btn');
  const nextBtn        = document.getElementById('next-btn');
  const seeBtn         = document.getElementById('see-btn');
  const profileScreen  = document.getElementById('profile-screen');
  const impressionScreen = document.getElementById('impression-screen');
  const impPhoto       = document.getElementById('imp-photo');
  const impName        = document.getElementById('imp-name');
  const typewriterText = document.getElementById('typewriter-text');
  const cursor         = document.getElementById('cursor');
  const spotifyWrap    = document.getElementById('spotify-wrap');
  const spotifyIframe  = document.getElementById('spotify-iframe');
  const backBtn        = document.getElementById('back-btn');
  const dots           = document.querySelectorAll('.dot');

  function loadProfile(idx) {
    profilePhoto.classList.add('switching');
    profileName.classList.add('switching');
    setTimeout(() => {
      profilePhoto.src = profiles[idx].photo;
      profileName.textContent = profiles[idx].name;
      profilePhoto.classList.remove('switching');
      profileName.classList.remove('switching');
    }, 270);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  loadProfile(0);

  prevBtn.addEventListener('click', () => {
    current = (current - 1 + profiles.length) % profiles.length;
    loadProfile(current);
  });
  nextBtn.addEventListener('click', () => {
    current = (current + 1) % profiles.length;
    loadProfile(current);
  });

  seeBtn.addEventListener('click', () => {
    const p = profiles[current];
    profileScreen.classList.add('hidden');
    impressionScreen.classList.add('active');

    impPhoto.src = p.photo;
    impName.textContent = p.name;
    typewriterText.textContent = '';
    cursor.classList.remove('done');
    spotifyWrap.classList.remove('show');
    backBtn.classList.remove('show');
    spotifyIframe.src = '';

    // typewriter
    let i = 0;
    const text = p.impression;
    clearInterval(typeInterval);

    typeInterval = setInterval(() => {
      typewriterText.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(typeInterval);
        cursor.classList.add('done');
        // show spotify
        setTimeout(() => {
          spotifyIframe.src = p.spotify + '?utm_source=generator&theme=0';
          spotifyWrap.classList.add('show');
        }, 300);
        // show back
        setTimeout(() => {
          backBtn.classList.add('show');
        }, 600);
      }
    }, 22);
  });

  backBtn.addEventListener('click', () => {
    clearInterval(typeInterval);
    spotifyIframe.src = '';
    impressionScreen.classList.remove('active');
    profileScreen.classList.remove('hidden');
  });

  // Loading
  const startTime = Date.now();
  function hideLoading() {
    const elapsed = Date.now() - startTime;
    const delay = Math.max(0, 1800 - elapsed);
    setTimeout(() => {
      loadingEl.classList.add('hide');
      appEl.classList.add('show');
      setTimeout(() => { if (loadingEl.parentNode) loadingEl.remove(); }, 700);
    }, delay);
  }
  window.addEventListener('load', hideLoading);
  // Fallback: force hide after 4s no matter what
  setTimeout(hideLoading, 4000);
</script>
</body>
</html>
